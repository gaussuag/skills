<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>__TITLE__</title>
  <style>
    :root{--bg:#f6f7f9;--panel:#fff;--line:#d8dde6;--text:#20242c;--muted:#667085;--accent:#2563eb;--pass:#16803c;--fail:#c0352b;--block:#a15c06;--untested:#596579;--chip:#eef2f7;--shadow:0 12px 32px rgba(18,24,38,.08)}
    *{box-sizing:border-box}body{margin:0;min-width:320px;color:var(--text);background:var(--bg);font-family:"Microsoft YaHei","Segoe UI",Arial,sans-serif;line-height:1.5}button,input,select,textarea{font:inherit}button{cursor:pointer}.shell{max-width:1440px;margin:0 auto;padding:24px}.topbar{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:16px;align-items:start;margin-bottom:18px}.title-block h1{margin:0;font-size:28px;letter-spacing:0}.title-block p{margin:8px 0 0;color:var(--muted);max-width:980px}.actions{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end}.btn{border:1px solid var(--line);border-radius:8px;background:var(--panel);color:var(--text);padding:8px 12px;white-space:nowrap}.stats-grid{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:10px;margin-bottom:16px}.stat{border:1px solid var(--line);border-radius:8px;background:var(--panel);padding:12px;min-height:82px}.stat-label{color:var(--muted);font-size:13px}.stat-value{margin-top:4px;font-size:28px;font-weight:700}.progress{height:10px;overflow:hidden;border-radius:999px;background:#e5eaf1;margin:4px 0 18px}.progress-bar{height:100%;width:0;background:linear-gradient(90deg,#16803c,#2563eb);transition:width .2s ease}.filters{position:sticky;top:0;z-index:5;border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.96);backdrop-filter:blur(10px);padding:12px;margin-bottom:14px;box-shadow:0 8px 24px rgba(18,24,38,.08)}.filter-grid{display:grid;grid-template-columns:minmax(220px,2fr) repeat(4,minmax(130px,1fr));gap:10px}.field label{display:block;margin-bottom:4px;color:var(--muted);font-size:12px}.field input,.field select{width:100%;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--text);padding:8px 10px;min-height:38px}.case-list{display:grid;gap:12px}.case-card{border:1px solid var(--line);border-radius:8px;background:var(--panel);box-shadow:var(--shadow);overflow:hidden}.case-head{display:grid;grid-template-columns:auto minmax(0,1fr) auto;gap:12px;align-items:start;padding:14px 16px;border-bottom:1px solid var(--line)}.case-id{min-width:72px;border-radius:8px;background:var(--chip);padding:8px 10px;text-align:center;font-weight:700}.case-title h3{margin:0;font-size:17px}.meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}.pill{border-radius:999px;background:var(--chip);color:var(--muted);padding:3px 8px;font-size:12px}.pill.changed{background:#fff4dc;color:#8a4b00}.status-tag{border-radius:999px;padding:6px 10px;font-size:13px;font-weight:700;color:#fff;white-space:nowrap}.status-untested{background:var(--untested)}.status-passed{background:var(--pass)}.status-failed{background:var(--fail)}.status-blocked{background:var(--block)}.case-body{display:grid;grid-template-columns:minmax(0,1.2fr) minmax(280px,.8fr);gap:14px;padding:16px}.detail-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.detail{border:1px solid var(--line);border-radius:8px;padding:10px;background:#fbfcfe;min-height:96px}.detail.full{grid-column:1/-1}.detail h4{margin:0 0 6px;color:var(--muted);font-size:12px;font-weight:700}.detail p{margin:0}.log{font-family:Consolas,"Courier New",monospace;font-size:13px;word-break:break-word;color:#344054}.result-panel{border:1px solid var(--line);border-radius:8px;padding:12px;background:#fbfcfe}.status-buttons{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:12px}.status-btn{border:1px solid var(--line);border-radius:8px;background:#fff;padding:8px;min-height:38px;color:var(--text)}.status-btn.active[data-status=passed]{border-color:var(--pass);background:#eaf7ee;color:var(--pass);font-weight:700}.status-btn.active[data-status=failed]{border-color:var(--fail);background:#fdeceb;color:var(--fail);font-weight:700}.status-btn.active[data-status=blocked]{border-color:var(--block);background:#fff3df;color:var(--block);font-weight:700}.status-btn.active[data-status=untested]{border-color:var(--untested);background:#eef2f7;color:var(--untested);font-weight:700}.qa-fields{display:grid;gap:8px}.qa-fields input,.qa-fields textarea{width:100%;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--text);padding:8px 10px}.qa-fields textarea{min-height:88px;resize:vertical}.last-updated{color:var(--muted);font-size:12px}.empty{border:1px dashed var(--line);border-radius:8px;background:var(--panel);padding:32px;text-align:center;color:var(--muted)}
    @media (max-width:1100px){.stats-grid{grid-template-columns:repeat(3,minmax(120px,1fr))}.filter-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.case-body{grid-template-columns:1fr}}@media (max-width:720px){.shell{padding:14px}.topbar,.case-head,.detail-grid,.filter-grid,.stats-grid{grid-template-columns:1fr}.actions{justify-content:stretch}.btn{flex:1}.filters{position:static}}@media print{body{background:#fff}.actions,.filters,.result-panel{display:none}.case-card,.stat{box-shadow:none}}
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="title-block">
        <h1>__TITLE__</h1>
        <p>__SUMMARY__</p>
      </div>
      <div class="actions">
        <button class="btn" type="button" id="printBtn">打印</button>
        <button class="btn" type="button" id="exportBtn">导出结果</button>
        <button class="btn" type="button" id="importBtn">导入结果</button>
        <button class="btn" type="button" id="resetBtn">清空状态</button>
        <input type="file" id="importFile" accept="application/json" hidden>
      </div>
    </header>
    <section class="stats-grid" aria-label="测试统计">
      <div class="stat"><div class="stat-label">总用例</div><div class="stat-value" id="statTotal">0</div></div>
      <div class="stat"><div class="stat-label">已通过</div><div class="stat-value" id="statPassed">0</div></div>
      <div class="stat"><div class="stat-label">未通过</div><div class="stat-value" id="statFailed">0</div></div>
      <div class="stat"><div class="stat-label">阻塞</div><div class="stat-value" id="statBlocked">0</div></div>
      <div class="stat"><div class="stat-label">未测试</div><div class="stat-value" id="statUntested">0</div></div>
    </section>
    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    <section class="filters" aria-label="筛选">
      <div class="filter-grid">
        <div class="field"><label for="searchInput">搜索</label><input id="searchInput" type="search" placeholder="输入 ID、场景、日志关键字"></div>
        <div class="field"><label for="statusFilter">状态</label><select id="statusFilter"><option value="all">全部状态</option><option value="untested">未测试</option><option value="passed">通过</option><option value="failed">不通过</option><option value="blocked">阻塞</option></select></div>
        <div class="field"><label for="priorityFilter">优先级</label><select id="priorityFilter"><option value="all">全部优先级</option></select></div>
        <div class="field"><label for="areaFilter">业务域</label><select id="areaFilter"><option value="all">全部业务域</option></select></div>
        <div class="field"><label for="changeFilter">范围</label><select id="changeFilter"><option value="all">全部用例</option><option value="changed">仅调整/新增</option><option value="base">Base 候选</option></select></div>
      </div>
    </section>
    <section class="case-list" id="caseList" aria-label="测试用例列表"></section>
  </main>
  <script>
    const DATA = __CASES_JSON__;
    const STORAGE_KEY = "qa-case-results:" + (DATA.storage_key || DATA.title || "default");
    const statusText = { untested: "未测试", passed: "通过", failed: "不通过", blocked: "阻塞" };
    const testCases = DATA.cases || [];
    let qaState = loadState();
    const els = {
      caseList: document.getElementById("caseList"),
      search: document.getElementById("searchInput"),
      status: document.getElementById("statusFilter"),
      priority: document.getElementById("priorityFilter"),
      area: document.getElementById("areaFilter"),
      change: document.getElementById("changeFilter")
    };
    function loadState(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}}catch(e){return {}}}
    function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(qaState))}
    function getRecord(id){if(!qaState[id])qaState[id]={status:"untested",tester:"",note:"",updatedAt:""};return qaState[id]}
    function esc(v){return String(v == null ? "" : v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
    function fillSelect(select, values){for(const value of Array.from(new Set(values.filter(Boolean))).sort()){const option=document.createElement("option");option.value=value;option.textContent=value;select.appendChild(option)}}
    function filters(){return{keyword:els.search.value.trim().toLowerCase(),status:els.status.value,priority:els.priority.value,area:els.area.value,change:els.change.value}}
    function matchCase(item,f){const r=getRecord(item.id);const text=[item.id,item.title,item.priority,item.area,item.case_type,item.step,item.trigger,item.expected,item.logs,item.notes,r.note,r.tester].join(" ").toLowerCase();if(f.keyword&&!text.includes(f.keyword))return false;if(f.status!=="all"&&r.status!==f.status)return false;if(f.priority!=="all"&&item.priority!==f.priority)return false;if(f.area!=="all"&&item.area!==f.area)return false;if(f.change==="changed"&&!["new","changed"].includes(item.change_state))return false;if(f.change==="base"&&!item.base_candidate)return false;return true}
    function renderStats(){const c={total:testCases.length,passed:0,failed:0,blocked:0,untested:0};for(const item of testCases)c[getRecord(item.id).status]++;document.getElementById("statTotal").textContent=c.total;document.getElementById("statPassed").textContent=c.passed;document.getElementById("statFailed").textContent=c.failed;document.getElementById("statBlocked").textContent=c.blocked;document.getElementById("statUntested").textContent=c.untested;const done=c.passed+c.failed+c.blocked;document.getElementById("progressBar").style.width=(c.total?Math.round(done/c.total*100):0)+"%"}
    function render(){const f=filters();const visible=testCases.filter(item=>matchCase(item,f));els.caseList.innerHTML=visible.length?visible.map(renderCase).join(""):'<div class="empty">没有匹配的测试用例。</div>';renderStats()}
    function renderCase(item){const r=getRecord(item.id);const status=r.status||"untested";const changed=["new","changed"].includes(item.change_state)?'<span class="pill changed">调整/新增</span>':"";const base=item.base_candidate?'<span class="pill changed">Base 候选</span>':"";const evidence=(item.evidence||[]).map(e=>`${esc(e.file||"")}${e.line?":"+esc(e.line):""} ${esc(e.reason||"")}`).join("<br>");return `<article class="case-card" data-id="${esc(item.id)}"><div class="case-head"><div class="case-id">${esc(item.id)}</div><div class="case-title"><h3>${esc(item.title)}</h3><div class="meta"><span class="pill">${esc(item.priority)}</span><span class="pill">${esc(item.area)}</span><span class="pill">${esc(item.case_type||"case")}</span>${changed}${base}</div></div><div class="status-tag status-${esc(status)}">${statusText[status]}</div></div><div class="case-body"><div class="detail-grid"><div class="detail"><h4>业务 Step</h4><p>${esc(item.step)}</p></div><div class="detail"><h4>操作/触发条件</h4><p>${esc(item.trigger)}</p></div><div class="detail"><h4>预期业务结果</h4><p>${esc(item.expected)}</p></div><div class="detail"><h4>关键日志断言</h4><p class="log">${esc(item.logs)}</p></div>${evidence?`<div class="detail full"><h4>代码依据</h4><p class="log">${evidence}</p></div>`:""}</div><div class="result-panel"><div class="status-buttons">${statusButton(item.id,"untested",status)}${statusButton(item.id,"passed",status)}${statusButton(item.id,"failed",status)}${statusButton(item.id,"blocked",status)}</div><div class="qa-fields"><input type="text" data-field="tester" value="${esc(r.tester||"")}" placeholder="测试人"><textarea data-field="note" placeholder="记录环境、日志链接、失败原因或复测备注">${esc(r.note||"")}</textarea><div class="last-updated">${r.updatedAt?"最后更新："+esc(r.updatedAt):"尚未记录测试结果"}</div></div></div></div></article>`}
    function statusButton(id,value,current){return `<button class="status-btn${value===current?" active":""}" type="button" data-id="${esc(id)}" data-status="${esc(value)}">${statusText[value]}</button>`}
    function setStatus(id,status){const r=getRecord(id);r.status=status;r.updatedAt=new Date().toLocaleString("zh-CN",{hour12:false});saveState();render()}
    function setField(id,field,value){const r=getRecord(id);r[field]=value;r.updatedAt=new Date().toLocaleString("zh-CN",{hour12:false});saveState();renderStats()}
    function exportResults(){const rows=testCases.map(item=>Object.assign({case:item},getRecord(item.id)));const blob=new Blob([JSON.stringify({title:DATA.title,exported_at:new Date().toISOString(),results:rows},null,2)],{type:"application/json;charset=utf-8"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=(DATA.storage_key||"qa-results")+".json";document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url)}
    function importResults(file){const reader=new FileReader();reader.onload=()=>{try{const data=JSON.parse(reader.result);for(const row of data.results||[]){const id=(row.case&&row.case.id)||row.id;if(id)qaState[id]={status:row.status||"untested",tester:row.tester||"",note:row.note||"",updatedAt:row.updatedAt||new Date().toLocaleString("zh-CN",{hour12:false})}}saveState();render()}catch(e){alert("导入失败："+e.message)}};reader.readAsText(file)}
    els.caseList.addEventListener("click",e=>{const b=e.target.closest(".status-btn");if(b)setStatus(b.dataset.id,b.dataset.status)});
    els.caseList.addEventListener("input",e=>{const card=e.target.closest(".case-card");if(card&&e.target.dataset.field)setField(card.dataset.id,e.target.dataset.field,e.target.value)});
    for(const c of [els.search,els.status,els.priority,els.area,els.change]){c.addEventListener("input",render);c.addEventListener("change",render)}
    document.getElementById("printBtn").addEventListener("click",()=>window.print());
    document.getElementById("exportBtn").addEventListener("click",exportResults);
    document.getElementById("importBtn").addEventListener("click",()=>document.getElementById("importFile").click());
    document.getElementById("importFile").addEventListener("change",e=>{if(e.target.files[0])importResults(e.target.files[0])});
    document.getElementById("resetBtn").addEventListener("click",()=>{if(confirm("确认清空所有测试状态、测试人和备注？")){qaState={};saveState();render()}});
    fillSelect(els.priority,testCases.map(x=>x.priority));
    fillSelect(els.area,testCases.map(x=>x.area));
    render();
  </script>
</body>
</html>
